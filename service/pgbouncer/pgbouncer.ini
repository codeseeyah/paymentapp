[databases]
paymentapp = host=postgres port=5432 dbname=paymentapp
paymentapp-test = host=postgres port=5432 dbname=paymentapp-test

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 5
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
ignore_startup_parameters = extra_float_digits

[users]
# empty - trust auth used for local testing
