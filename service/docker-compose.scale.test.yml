services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: paymentapp-test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes: []
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-simulator:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: simulator
      SERVER_PORT: 8081
      PAYMENT_SIMULATOR_MIN_DELAY_MS: "10"
      PAYMENT_SIMULATOR_MAX_DELAY_MS: "2000"
      PAYMENT_SIMULATOR_FAILURE_RATE: "0.05"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paymentapp-test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  producer:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paymentapp-test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      PAYMENT_SIMULATOR_URL: http://payment-simulator:8081/simulate
      PAYMENT_WORKER_SCHEDULED: "false"
    depends_on:
      - postgres
      - payment-simulator

  worker:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 0
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paymentapp-test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      PAYMENT_SIMULATOR_URL: http://payment-simulator:8081/simulate
      PAYMENT_WORKER_SCHEDULED: "true"
    depends_on:
      - postgres
      - payment-simulator

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ./perf/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - producer
      - payment-simulator

volumes: {}